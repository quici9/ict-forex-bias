name: ICT Forex Bias — Daily Run (V3)

on:
  schedule:
    # London pre-KZ — 08:45 VN (01:45 UTC), Mon–Fri
    # Records yesterday's actual + generates today's signals
    - cron: "45 1 * * 1-5"
    # NY pre-KZ — 13:45 VN (06:45 UTC), Mon–Fri
    # Generates today's signals (reminder)
    - cron: "45 6 * * 1-5"
  workflow_dispatch:
    # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Record yesterday's actual (London run only)
        # D1 Forex candles close at 22:00 UTC — London run (01:45 UTC) is safe to record
        if: github.event_name == 'schedule'
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          PREV_DATE=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)
          HOUR=$(date -u +%H)
          # Only record at London run (01:45 UTC, hour=01)
          if [ "$HOUR" = "01" ]; then
            echo "Recording actuals for $PREV_DATE"
            python scripts/v2/daily_run.py --record "$PREV_DATE" || true
          fi

      - name: Generate daily signals
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/v2/daily_run.py

      - name: Commit live performance data
        run: |
          git config user.name "ict-bias-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/live_performance.jsonl data/live_stats.json
          git diff --staged --quiet || git commit -m "bot: bias $(date -u +%Y-%m-%d) $(date -u +%H:%M) UTC"
          git push
