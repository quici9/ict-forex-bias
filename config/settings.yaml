# ICT Forex Bias System — settings.yaml
# Edit this file to tune weights, thresholds, and feature parameters.
# No source code changes needed — pipeline reads this on every run.

instruments:
  - symbol: "EURUSD=X"
    name: "EUR/USD"
    smt_partner: "GBPUSD=X"
    enabled: true

  - symbol: "GBPUSD=X"
    name: "GBP/USD"
    smt_partner: "EURUSD=X"
    enabled: true

  - symbol: "USDJPY=X"
    name: "USD/JPY"
    smt_partner: "USDCHF=X"
    enabled: true

  - symbol: "USDCHF=X"
    name: "USD/CHF"
    smt_partner: "USDJPY=X"
    enabled: true

  - symbol: "AUDUSD=X"
    name: "AUD/USD"
    smt_partner: "NZDUSD=X"
    enabled: true

  - symbol: "NZDUSD=X"
    name: "NZD/USD"
    smt_partner: "AUDUSD=X"
    enabled: true

  - symbol: "USDCAD=X"
    name: "USD/CAD"
    smt_partner: "DX-Y.NYB"
    enabled: true

  - symbol: "GBPJPY=X"
    name: "GBP/JPY"
    smt_partner: "USDJPY=X"
    enabled: true

reference:
  dxy: "DX-Y.NYB"

scoring:
  weights:
    d1_structure: 0.25
    structure_alignment: 0.15
    price_zone: 0.15
    fvg_h4: 0.15
    sweep: 0.15
    smt: 0.10
    bos_recent: 0.05

  thresholds:
    high_conviction: 70    # BULLISH / BEARISH
    watchlist: 50          # WATCHLIST; below this → NEUTRAL

  w1_multipliers:
    aligned: 1.0
    ranging: 0.9
    counter_trend: 0.75

  low_vol_threshold: 0.30  # ATR < 30% of 20-day avg → LOW_VOL

features:
  swing_lookback: 5          # candles each side to identify swing point
  fvg_min_displacement: 1.5  # displacement candle body >= N × ATR(14)
  fvg_lookback_candles: 10   # H4 candles to look back for unfilled FVGs
  sweep_lookback_candles: 3  # H4 candles to check for recent sweep
  smt_max_candle_diff: 5     # max distance between two swings for SMT comparison

data:
  d1_candles: 60
  h4_candles: 30
  h1_candles: 72
  w1_candles: 20
  min_d1_candles: 30         # validation minimum
  min_h4_candles: 20
  min_h1_candles: 24
  min_w1_candles: 10
  pdh_pdl_atr_threshold: 0.5 # near PDH/PDL if within 0.5 × ATR
  stale_data_days: 2         # flag stale if last candle > N trading days ago

notification:
  timezone: "Asia/Ho_Chi_Minh"
  min_score_to_show: 50        # hide instruments below this in detail section
  max_detail_instruments: 3    # number of instruments to expand with detail
